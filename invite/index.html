<div class="container">
  <img src="https://movethatcouch.com/mtc_couch_appicon_white_1024_adjusted.png">
  <h1>MOVE THAT COUCH!</h1>
  <p>Furniture delivery, made easy.</p>
</div>

<script>

const path = window.location.pathname;
const slug = path.split("/").pop();

if(slug && slug !== "invite"){
  localStorage.setItem("mtc_pending_slug", slug);
}

setTimeout(()=>{
  window.location.href = "https://app.movethatcouch.com";
},1000);

</script>

</body>
