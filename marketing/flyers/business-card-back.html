<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Card Back • MOVE THAT COUCH!</title>
  <style>
    :root{
      /* 3.5" x 2" @ 300dpi */
      --w: 1050px;
      --h: 600px;

      --green:#22c55e;
      --greenSoft:#eafff0;
      --greenSoft2:#d9ffe7;

      --ink:#0f172a;
      --muted:#475569;
      --line:#e2e8f0;
    }

    html, body { margin:0; padding:0; background:#fff; }

    #flyer{
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:#fff;
      color: var(--ink);
    }

    .pad{
      padding: 56px 56px 66px 56px;
      height: 100%;
      box-sizing: border-box;
      display:grid;
      grid-template-columns: 1fr 440px;
      gap: 40px;
      align-items:center;
    }

    .copy{
      display:flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .headline{
      margin:0;
      font-weight: 950;
      letter-spacing: 0.2px;
      color: var(--ink);
    }
    .headlineLine1{
      font-size: 58px;
      line-height: 1.05;
    }
    .headlineLine2{
      font-size: 58px;
      line-height: 1.05;
      margin-top: 14px;
    }

    .greenWord{ color: #16a34a; } /* “quotes” emphasis */

    .subPill{
      display:inline-block;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--greenSoft), #ffffff);
      border: 1px solid #b7f7c8;
      color: #14532d;
      font-size: 22px;
      font-weight: 850;
      margin-top: 4px;
    }

    .bullets{
      margin-top: 10px;
      font-size: 22px;
      color: var(--muted);
      line-height: 1.4;
      font-weight: 650;
    }

    /* ✅ Green presence lives here */
    .qrWrap{
      border-radius: 26px;
      padding: 18px 18px 16px 18px;
      display:flex;
      flex-direction: column;
      align-items:center;
      justify-content: center;
      gap: 12px;

      background: linear-gradient(180deg, var(--greenSoft), #ffffff);
      border: 2px solid #b7f7c8;
    }

    #qrCanvas{
      width: 360px;
      height: 360px;
      background:#fff;
      image-rendering: pixelated;
      display:block;
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.10);
    }

    .url{
      font-size: 20px;
      font-weight: 900;
      color: #0b1220;
      text-align:center;
      word-break: break-all;
    }

    .refLine{
      font-size: 18px;
      font-weight: 900;
      color: #14532d;
      text-align:center;
      display:none;
    }

    .legal{
      position:absolute;
      left: 56px;
      right: 56px;
      bottom: 18px;
      font-size: 13px;
      color: #64748b;
      text-align:center;
      line-height: 1.2;
      font-weight: 650;
    }
  </style>
</head>

<body>
  <div id="flyer">
    <div class="pad">
      <div class="copy">
        <div class="headline">
          <div class="headlineLine1">Need it delivered?</div>
          <div class="headlineLine2">Get competing <span class="greenWord">quotes</span>.</div>
        </div>

        <div class="subPill">Single-item &amp; small-load deliveries</div>

        <div class="bullets">
          Furniture • Appliances • Marketplace pickups
        </div>
      </div>

      <div class="qrWrap">
        <canvas id="qrCanvas"></canvas>
        <div class="url" id="urlText">movethatcouch.com</div>
        <div class="refLine" id="refLine">Referral code: <span id="refCode"></span></div>
      </div>
    </div>

    <div class="legal">
      Drivers are independent contractors, not employees of MOVE THAT COUCH!
    </div>
  </div>

  <script>
    window.__flyerReady = (async function(){
      function getParams(){
        const params = new URLSearchParams(window.location.search);
        const qr = params.get("qr") || "https://movethatcouch.com";
        const code = (params.get("code") || "").trim();
        return { qr, code };
      }

      function normalizeDisplayUrl(url){
        try{
          const u = new URL(url);
          const path = (u.pathname || "/").replace(/\/+$/, "") || "";
          return (u.host + path) || "movethatcouch.com";
        }catch(e){
          return (url || "movethatcouch.com").replace(/^https?:\/\//i, "");
        }
      }

      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js";
        s.async = true;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });

      const { qr, code } = getParams();

      const urlText = document.getElementById("urlText");
      urlText.textContent = normalizeDisplayUrl(qr);

      const refLine = document.getElementById("refLine");
      const refCode = document.getElementById("refCode");
      const codeLooksValid = !!code && code.length >= 4 && !/movethatcouch\.com/i.test(code);
      if(codeLooksValid){
        refCode.textContent = code;
        refLine.style.display = "block";
      }

      const canvas = document.getElementById("qrCanvas");
      const cssW = Math.round(parseFloat(getComputedStyle(canvas).width));
      const cssH = Math.round(parseFloat(getComputedStyle(canvas).height));
      canvas.width = cssW;
      canvas.height = cssH;

      const ctx = canvas.getContext("2d");

      function drawQr(text){
        const qrObj = window.qrcode(0, "M");
        qrObj.addData(text);
        qrObj.make();

        const size = canvas.width;
        const cells = qrObj.getModuleCount();
        const tile = size / cells;

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = "#000000";
        for(let r=0; r<cells; r++){
          for(let c=0; c<cells; c++){
            if(qrObj.isDark(r,c)){
              ctx.fillRect(
                Math.floor(c*tile),
                Math.floor(r*tile),
                Math.ceil(tile),
                Math.ceil(tile)
              );
            }
          }
        }
      }

      await new Promise(r => setTimeout(r, 200));
      drawQr(qr);
      await new Promise(r => setTimeout(r, 120));
    })();
  </script>
</body>
</html>
