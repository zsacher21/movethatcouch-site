<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Back • MOVE THAT COUCH!</title>

<style>
:root{
  /* 3.5" x 2" @ 300dpi */
  --w:1050px;
  --h:600px;

  --ink:#0f172a;
  --muted:#475569;
  --line:#e2e8f0;
  --brand:#29b34a; /* MOVE THAT COUCH green */
}

html,body{
  margin:0;
  padding:0;
  background:#fff;
}

#flyer{
  width:var(--w);
  height:var(--h);
  box-sizing:border-box;
  position:relative;
  overflow:hidden;

  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

  background:#fff;
  color:var(--ink);
}

.couchIcon{
  width:145px;        /* larger */
  height:auto;
  display:block;
  margin:0 auto -18px auto;  /* center + spacing below */
}

.pad{
  padding:56px 56px 64px 56px;
  height:100%;
  box-sizing:border-box;

  display:grid;
  grid-template-columns:1fr 420px;
  gap:42px;
  align-items:center;
}

/* LEFT SIDE COPY */

.copy{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:30px;

  margin-top:-30px;   /* lifts the whole left column */
}

.headline{
  margin:0;
  font-weight:950;
  letter-spacing:-0.6px;
  color:var(--ink);
}

.headlineLine1{
  font-size:58px;
  line-height:1.05;
}

.headlineLine2{
  font-size:58px;
  line-height:1.05;
  margin-top:18px;
}

/* GREEN VALUE LINE */

.sub{
  font-size:26px;
  font-weight:800;
  color:var(--brand);
  line-height:1.25;
  letter-spacing:0.2px;
  white-space:nowrap;
}

/* QR BOX */

.qrWrap{
  border:2px solid var(--line);
  border-radius:22px;

  padding:20px 20px 18px 20px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:12px;
}

#qrCanvas{
  width:360px;
  height:360px;
  background:#fff;
  image-rendering:pixelated;
  display:block;
  border-radius:14px;
}

.url{
  font-size:20px;
  font-weight:800;
  color:#0b1220;
  text-align:center;
  word-break:break-all;
}

.refLine{
  font-size:18px;
  font-weight:800;
  color:#14532d;
  text-align:center;
  display:none;
}

/* LEGAL */

.legal{
  position:absolute;
  left:56px;
  right:56px;
  bottom:18px;

  font-size:14px;
  color:#64748b;

  text-align:center;
  line-height:1.2;
  font-weight:650;
}
</style>
</head>

<body>

<div id="flyer">

<div class="pad">

<div class="copy">

<img class="couchIcon" src="/mtc_couch_appicon_white_1024_adjusted.png" alt="Move That Couch icon">

<div class="headline">
<div class="headlineLine1">Need it delivered?</div>
<div class="headlineLine2">Get competing quotes.</div>
</div>

<div class="sub">
Single item • Small loads • Easy to&nbsp;book.
</div>

</div>

<div class="qrWrap">
<canvas id="qrCanvas"></canvas>

<div class="url" id="urlText">
movethatcouch.com
</div>

<div class="refLine" id="refLine">
Referral code: <span id="refCode"></span>
</div>
</div>

</div>

<div class="legal">
Drivers are independent contractors, not employees of MOVE THAT COUCH!
</div>

</div>

<script>

window.__flyerReady = (async function(){

function getParams(){
  const params = new URLSearchParams(window.location.search);

  const qr = params.get("qr") || "https://movethatcouch.com";
  const code = (params.get("code") || "").trim();

  return {qr,code};
}

function normalizeDisplayUrl(url){
  try{
    const u = new URL(url);
    const path=(u.pathname||"/").replace(/\/+$/,"")||"";
    return (u.host+path)||"movethatcouch.com";
  }catch(e){
    return (url||"movethatcouch.com").replace(/^https?:\/\//i,"");
  }
}

/* load QR library */

await new Promise((resolve,reject)=>{
  const s=document.createElement("script");
  s.src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js";
  s.async=true;
  s.onload=resolve;
  s.onerror=reject;
  document.head.appendChild(s);
});

const {qr,code}=getParams();

/* URL display */

const urlText=document.getElementById("urlText");
urlText.textContent=normalizeDisplayUrl(qr);

/* referral */

const refLine=document.getElementById("refLine");
const refCode=document.getElementById("refCode");

const codeLooksValid=!!code && code.length>=4 && !/movethatcouch\.com/i.test(code);

if(codeLooksValid){
  refCode.textContent=code;
  refLine.style.display="block";
}

/* QR rendering */

const canvas=document.getElementById("qrCanvas");

const cssW=Math.round(parseFloat(getComputedStyle(canvas).width));
const cssH=Math.round(parseFloat(getComputedStyle(canvas).height));

canvas.width=cssW;
canvas.height=cssH;

const ctx=canvas.getContext("2d");

function drawQr(text){

  const qrObj=window.qrcode(0,"M");
  qrObj.addData(text);
  qrObj.make();

  const size=canvas.width;
  const cells=qrObj.getModuleCount();
  const tile=size/cells;

  ctx.fillStyle="#ffffff";
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle="#000000";

  for(let r=0;r<cells;r++){
    for(let c=0;c<cells;c++){

      if(qrObj.isDark(r,c)){

        ctx.fillRect(
          Math.floor(c*tile),
          Math.floor(r*tile),
          Math.ceil(tile),
          Math.ceil(tile)
        );

      }
    }
  }
}

await new Promise(r=>setTimeout(r,200));

drawQr(qr);

await new Promise(r=>setTimeout(r,120));

})();

</script>

</body>
</html>
