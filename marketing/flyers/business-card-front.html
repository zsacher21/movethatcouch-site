<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Front • MOVE THAT COUCH!</title>

<style>
  :root{
    /* Portrait business card */
    --w:600px;
    --h:1050px;
  }

  html,body{
    margin:0;
    padding:0;
    background:#fff;
  }

  #flyer{
    width:var(--w);
    height:var(--h);
    box-sizing:border-box;
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  .stack{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    gap:8px;
    padding:60px 60px;
    box-sizing:border-box;
  }

  .fullLogo{
    max-height:720px;
    max-width:480px;
    width:auto;
    height:auto;
    display:block;
  }

  .tagline{
    font-size:40px;
    font-weight:900;
    color:#1f2937;
    letter-spacing:.2px;
    line-height:1.1;

    margin-top:-40px;
  }
</style>
</head>

<body>
  <div id="flyer">
    <div class="stack">
      <img class="fullLogo" src="/logo.png" alt="MOVE THAT COUCH!" />
      <div class="tagline">Furniture delivery, made easy.</div>
    </div>
  </div>

  <script>
    window.__flyerReady = (async function(){
      await new Promise(r => setTimeout(r,120));
    })();
  </script>
</body>
</html>
