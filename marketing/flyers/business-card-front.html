<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Front • MOVE THAT COUCH!</title>

<style>
  :root{
    /* LANDSCAPE business card */
    --w:1050px;
    --h:600px;

    /* Layout tuning */
    --pad:64px;
    --gap:56px;
  }

  html,body{
    margin:0;
    padding:0;
    background:#fff;
  }

  #flyer{
    width:var(--w);
    height:var(--h);
    box-sizing:border-box;
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .grid{
    width:100%;
    height:100%;
    padding:var(--pad);
    box-sizing:border-box;

    display:grid;
    grid-template-columns: 1.2fr 0.8fr; /* logo gets more room */
    gap:var(--gap);
    align-items:center; /* vertical centering */
  }

  /* LEFT: logo column */
  .brand{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .fullLogo{
    max-height: calc(var(--h) - (var(--pad) * 2));
    max-width: 100%;
    width:auto;
    height:auto;
    display:block;
  }

  /* RIGHT: tagline column */
  .tagWrap{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    text-align:left;
  }

  .tagline{
    font-size:52px;
    font-weight:900;
    color:#1f2937;
    letter-spacing:.2px;
    line-height:1.04;
  }

  .tagline .line{
    display:block;
    white-space:nowrap;
  }

  /* tiny optical nudge */
  .tagWrapInner{
    transform: translateY(-2px);
  }
</style>
</head>

<body>
  <div id="flyer">
    <div class="grid">
      <div class="brand">
        <img class="fullLogo" src="/logo.png" alt="MOVE THAT COUCH!" />
      </div>

      <div class="tagWrap">
        <div class="tagWrapInner">
          <div class="tagline">
            <span class="line">Furniture delivery,</span>
            <span class="line">made easy.</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    window.__flyerReady = (async function(){
      await new Promise(r => setTimeout(r,120));
    })();
  </script>
</body>
</html>
