<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Front • MOVE THAT COUCH!</title>

<style>
  :root{
    --w:1050px;
    --h:600px;
  }

  html,body{
    margin:0;
    padding:0;
    background:#fff;
  }

  #flyer{
    width:var(--w);
    height:var(--h);
    box-sizing:border-box;
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
  }

  .stack{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;           /* 🔥 this controls logo ↔ tagline spacing */
    padding: 40px 64px;
    box-sizing:border-box;
  }

  .fullLogo{
    max-height: 550px;  /* keeps it balanced */
    max-width: 860px;
    width:auto;
    height:auto;
    display:block;
  }

  .tagline{
    font-size: 36px;
    font-weight: 900;
    color:#1f2937;
    letter-spacing:.2px;
    line-height:1.1;
  }
</style>
</head>

<body>
  <div id="flyer">
    <div class="stack">
      <img class="fullLogo" src="/logo.png" alt="MOVE THAT COUCH!" />
      <div class="tagline">Furniture delivery, made easy.</div>
    </div>
  </div>

  <script>
    window.__flyerReady = (async function(){
      await new Promise(r => setTimeout(r,120));
    })();
  </script>
</body>
</html>
