<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Card Front • MOVE THAT COUCH!</title>
  <style>
    :root{
      /* 3.5" x 2" @ 300dpi */
      --w: 1050px;
      --h: 600px;

      --ink:#0f172a;
      --muted:#475569;
      --line:#e2e8f0;
    }

    html, body { margin:0; padding:0; background:#fff; }

    #flyer{
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:#fff;
      color: var(--ink);
    }

    .wrap{
      height:100%;
      padding: 64px 74px 56px 74px;
      display:flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      text-align:center;
    }

    /* Full logo */
    .fullLogo{
      width: 760px;
      max-width: 100%;
      height: auto;
      display:block;
    }

    .tag{
      margin-top: 6px;
      font-size: 28px;
      font-weight: 750;
      color: var(--muted);
    }

    .site{
      position:absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      text-align:center;
      font-size: 22px;
      color: #64748b;
      font-weight: 750;
      letter-spacing: 0.2px;
    }
  </style>
</head>

<body>
  <div id="flyer">
    <div class="wrap">
      <img class="fullLogo" src="/logo.png" alt="MOVE THAT COUCH!" />
      <div class="tag">Furniture delivery marketplace</div>
    </div>

    <div class="site">movethatcouch.com</div>
  </div>

  <script>
    window.__flyerReady = (async function(){
      await new Promise(r => setTimeout(r, 120));
    })();
  </script>
</body>
</html>
