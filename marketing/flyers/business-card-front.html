<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Front • MOVE THAT COUCH!</title>
<style>
  :root{ --w:1050px; --h:600px; }
  html,body{ margin:0; padding:0; background:#fff; }
  #flyer{
    width:var(--w);
    height:var(--h);
    box-sizing:border-box;
    background:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding-top:64px;
    text-align:center;
  }
  .fullLogo{
    width:540px;
    height:auto;
    display:block;
  }
  .tagline{
    margin-top:24px;
    font-size:36px;
    font-weight:900;
    color:#1f2937;
    letter-spacing:.2px;
  }
</style>
</head>
<body>
  <div id="flyer">
    <img class="fullLogo" src="/logo.png" alt="MOVE THAT COUCH!" />
    <div class="tagline">Furniture delivery, made easy.</div>
  </div>

  <script>
    window.__flyerReady = (async function(){
      await new Promise(r => setTimeout(r, 120));
    })();
  </script>
</body>
</html>
