<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Card Front • MOVE THAT COUCH!</title>

<style>
:root{
  /* LANDSCAPE business card */
  --w:1050px;
  --h:600px;
}

html,body{
  margin:0;
  padding:0;
  background:#fff;
}

#flyer{
  width:var(--w);
  height:var(--h);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-sizing:border-box;
}

/* Feature image container */
.cardImage{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Scale image to fit card cleanly */
.cardImage img{
  width:100%;
  height:100%;
  object-fit:cover; /* fills card nicely */
  display:block;
}
</style>
</head>

<body>

<div id="flyer">
  <div class="cardImage">
    <!-- Replace filename if needed -->
    <img src="/feature-image.png" alt="MOVE THAT COUCH! Furniture delivery made easy">
  </div>
</div>

<script>
window.__flyerReady = (async function(){
  await new Promise(r => setTimeout(r,120));
})();
</script>

</body>
</html>
