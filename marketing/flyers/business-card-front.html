<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Card Front • MOVE THAT COUCH!</title>
  <style>
    :root{
      /* 3.5" x 2" @ 300dpi */
      --w: 1050px;
      --h: 600px;

      --green1: #22c55e;
      --ink: #0f172a;
      --muted: #475569;
      --line: #e2e8f0;
    }

    html, body { margin:0; padding:0; background:#fff; }

    #card{
      width: var(--w);
      height: var(--h);
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:#fff;
      color: var(--ink);
    }

    /* subtle top accent to match brand without overpowering */
    .topAccent{
      position:absolute;
      left:0; top:0;
      width:100%;
      height:18px;
      background: linear-gradient(90deg, var(--green1), #34d399);
    }

    .wrap{
      height:100%;
      padding: 64px 74px 56px 74px;
      display:flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      text-align:center;
    }

    .logoBox{
      width: 138px; height: 138px;
      border-radius: 26px;
      background:#fff;
      border: 2px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }
    .logoBox img{
      width: 122px; height: 122px;
      object-fit: contain;
      display:block;
    }

    .brand{
      font-weight: 900;
      letter-spacing: 1px;
      font-size: 72px;
      line-height: 1.0;
      margin: 0;
    }

    .tag{
      font-size: 28px;
      font-weight: 750;
      color: var(--muted);
      margin-top: 2px;
    }

    .site{
      position:absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      text-align:center;
      font-size: 22px;
      color: #64748b;
      font-weight: 750;
      letter-spacing: 0.2px;
    }
  </style>
</head>

<body>
  <div id="card">
    <div class="topAccent"></div>

    <div class="wrap">
      <div class="logoBox">
        <img src="/mtc_couch_appicon_white_1024_adjusted.png" alt="MOVE THAT COUCH logo" />
      </div>

      <div>
        <div class="brand">MOVE THAT COUCH!</div>
        <div class="tag">Furniture delivery marketplace</div>
      </div>
    </div>

    <div class="site">movethatcouch.com</div>
  </div>

  <script>
    // keep the same pattern as your flyer templates
    window.__cardReady = (async function(){
      await new Promise(r => setTimeout(r, 120));
    })();
  </script>
</body>
</html>
